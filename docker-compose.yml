services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vollens-backend
    ports:
      - "8080:8080"
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vollens-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
